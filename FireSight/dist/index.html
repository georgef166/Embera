  <title>FireSight AR</title>

<body>
  <!-- Hidden video element for processing -->
  <video id="webcam" autoplay playsinline muted></video>

  <!-- Main AR Canvas where everything is drawn -->
  <canvas id="ar-canvas"></canvas>

  <!-- Tactical HUD UI -->
  <div id="hud">
    <!-- Decorator corners -->
    <div class="corner c-tl"></div>
    <div class="corner c-tr"></div>
    <div class="corner c-bl"></div>
    <div class="corner c-br"></div>

    <div class="hud-top">
      <span class="hud-status" id="sys-status">SYS: ONLINE</span>
      <span class="hud-status" id="model-status">AI: LOADING</span>
    </div>

    <div class="hud-bottom">
      <span class="hud-status" id="nav-mode">NAV: EXIT TRACKING</span>
    </div>
  </div>

  
</body>
